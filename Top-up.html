<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Top-up — Game & Service Top-up Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="app-styles.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="payment.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#2563eb",
  "dark": false,
  "viewMode": "both"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Shared route + state across desktop + mobile
  const [route, setRoute] = useState({ name: "home" });
  const [query, setQuery] = useState("");
  const [order, setOrder] = useState(null);
  const [receipt, setReceipt] = useState(null);

  const go = (next) => {
    setRoute(next);
    setTimeout(() => {
      document.querySelectorAll(".desk-body").forEach(el => el.scrollTop = 0);
    }, 0);
  };

  // Inject app styles + theme
  useEffect(() => {
    const tag = document.getElementById("__app_styles") || document.createElement("style");
    tag.id = "__app_styles";
    tag.textContent = APP_STYLES;
    if (!tag.parentNode) document.head.appendChild(tag);

    document.documentElement.setAttribute("data-theme", t.dark ? "dark" : "light");
    document.documentElement.style.setProperty("--brand", t.primaryColor);
  }, [t.dark, t.primaryColor]);

  const desktopOnly = t.viewMode === "desktop";
  const mobileOnly = t.viewMode === "mobile";

  return (
    <div className="stage" data-screen-label={`${route.name} (${t.viewMode})`}>
      <div className="stage-head">
        <div className="stage-title">
          <div className="dot"><Icons.Diamond size={18} stroke="#fff" sw={2}/></div>
          <div>
            <h1>Top-up — responsive prototype</h1>
            <p>Browse · select · direct top-up or get a code · pay with KHQR, bank, or card.</p>
          </div>
        </div>
        <div className="stage-tabs" role="tablist" aria-label="Viewport">
          <button className="stage-tab" aria-pressed={t.viewMode==="both"} onClick={()=>setTweak("viewMode","both")}>Desktop + Mobile</button>
          <button className="stage-tab" aria-pressed={t.viewMode==="desktop"} onClick={()=>setTweak("viewMode","desktop")}>Desktop</button>
          <button className="stage-tab" aria-pressed={t.viewMode==="mobile"} onClick={()=>setTweak("viewMode","mobile")}>Mobile</button>
        </div>
      </div>

      <div className={`stage-grid ${desktopOnly?"desktop-only":""} ${mobileOnly?"mobile-only":""}`}>
        {!mobileOnly && (
          <div className="desk" data-screen-label={`Desktop · ${route.name}`}>
            <div className="desk-bar">
              <span className="dot" style={{background:"#ff5f56"}}/>
              <span className="dot" style={{background:"#ffbd2e"}}/>
              <span className="dot" style={{background:"#27c93f"}}/>
              <div className="url"><span className="pill"><Icons.Lock size={12} sw={2}/>top-up.app{route.name==="detail" && route.game?`/${route.game.id}`:""}{route.name==="payment"?"/checkout":""}{route.name==="success"?"/order":""}</span></div>
              <span style={{ width:60 }}/>
            </div>
            <div className="desk-body thin-scroll">
              <div className="app">
                <TopNav onSearch={setQuery} query={query} route={route.name} go={go} cartCount={order?1:0}/>
                <div key={route.name + (route.game?.id||'')} className="route-content">
                  {route.name === "home" && <HomeScreen go={go} query={query} setQuery={setQuery}/>}
                  {route.name === "detail" && <DetailScreen game={route.game} go={go} setOrder={setOrder}/>}
                  {route.name === "payment" && order && <PaymentScreen order={order} go={go} setReceipt={setReceipt}/>}
                  {route.name === "success" && receipt && <SuccessScreen receipt={receipt} go={go}/>}
                </div>
              </div>
            </div>
          </div>
        )}

        {!desktopOnly && (
          <div className="phone" data-screen-label={`Mobile · ${route.name}`}>
            <div className="phone-screen">
              <div className="notch"/>
              <div className="status-bar">
                <span>9:41</span>
                <div className="right" style={{ paddingRight: 8 }}>
                  <Icons.Signal size={15} sw={1.6}/>
                  <Icons.Wifi size={15} sw={1.6}/>
                  <Icons.Battery size={20} sw={1.4}/>
                </div>
              </div>
              <MobileApp route={route} go={go} query={query} setQuery={setQuery} order={order} setOrder={setOrder} receipt={receipt} setReceipt={setReceipt}/>
            </div>
          </div>
        )}
      </div>

      <TweaksPanel>
        <TweakSection label="Theme"/>
        <TweakColor label="Primary color" value={t.primaryColor} onChange={(v) => setTweak("primaryColor", v)}/>
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)}/>
        <TweakSection label="Viewport"/>
        <TweakRadio label="Show" value={t.viewMode} options={[{value:"both",label:"Both"},{value:"desktop",label:"Desktop"},{value:"mobile",label:"Mobile"}]} onChange={(v) => setTweak("viewMode", v)}/>
        <TweakSection label="Quick presets"/>
        <TweakButton label="🎮 Gamer purple" onClick={() => { setTweak({primaryColor:"#8b5cf6", dark:true}); }}/>
        <TweakButton label="💰 Trust green" onClick={() => { setTweak({primaryColor:"#16a34a", dark:false}); }}/>
        <TweakButton label="🔥 Coral energy" onClick={() => { setTweak({primaryColor:"#f97316", dark:false}); }}/>
        <TweakButton label="🌌 Midnight blue" onClick={() => { setTweak({primaryColor:"#3b82f6", dark:true}); }}/>
        <TweakSection label="Jump to flow"/>
        <TweakButton label="Home / browse" onClick={() => go({ name:"home" })}/>
        <TweakButton label="Mobile Legends detail" onClick={() => go({ name:"detail", game: AppData.GAMES[0] })}/>
        <TweakButton label="Spotify (code flow)" onClick={() => go({ name:"detail", game: AppData.GAMES.find(g=>g.id==="spotify") })}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
